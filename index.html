<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <body>
      <h2>Text Formatting Example</h2>

      <p>This is a <b>bold (only style)</b> text.</p>

      <p>This is a <strong>strong (semantic bold)</strong> text.</p>

      <p>This is an <em>emphasized (meaningful italic)</em> text.</p>

      <p>This is an <i>italic (only style)</i> text.</p>

      <p>This is a <span style="color: blue">colored (span)</span> text.</p>

      <p>
        Line 1<br />
        Line 2 (using br tag)
      </p>

      <hr />

      <p>This is content after horizontal line.</p>
    </body>
  </body>
</html>
