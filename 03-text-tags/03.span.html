<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Span Tag</title>
	<style>
		.highlight {
			color: #b22222;
			font-weight: 700;
		}
	</style>
</head>
<body>
	<!--
		LESSON: Span Tag <span>

		Concept:
		<span> is an inline container used to style or target a part of text.

		Notes:
		1) <span> does not create a new line.
		2) It is mostly used with CSS classes, id, or JavaScript.
		3) Use it only when a small part of text needs different styling.
	-->

	<p>
		HTML is easy when you practice
		<span class="highlight">every single day</span>.
	</p>

	<!--
		Quick Revision:
		- <span> is inline.
		- Best for styling words or short text inside other tags.
		- Usually used inside <p>, <h1>, <li>, etc.
	-->
</body>
</html>
