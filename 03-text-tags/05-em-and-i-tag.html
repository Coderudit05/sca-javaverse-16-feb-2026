<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Em and I Tag</title>
  </head>
  <body>
    <!--
		LESSON: <em> vs <i>

		Concept:
		Both often appear italic, but they serve different purposes.

		Notes:
		1) <em> adds emphasis to the text (semantic meaning).
		2) <i> is used for alternate voice or style (visual/stylistic).
		3) Prefer <em> when the word meaning should be stressed.
	-->

    <p>You <em>must</em> practice HTML daily to improve quickly.</p>

    <p>
      The book title is written in italic style: <i>Learning Web Basics</i>.
    </p>

    <!--
		Quick Revision:
		- <em> = emphasis and meaning.
		- <i> = stylistic italic text.
		- Semantic tags improve accessibility.
	-->
  </body>
</html>
