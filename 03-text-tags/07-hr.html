<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>HR Tag</title>
	<style>
		hr {
			border: none;
			border-top: 2px solid #999;
			margin: 20px 0;
		}
	</style>
</head>
<body>
	<!--
		LESSON: Horizontal Rule Tag <hr>

		Concept:
		<hr> creates a thematic break between content sections.

		Notes:
		1) It usually appears as a horizontal line.
		2) It shows section change, not just decoration.
		3) You can style it with CSS.
	-->

	<h2>Chapter 1: Introduction</h2>
	<p>HTML gives structure to web pages using elements and tags.</p>

	<hr />

	<h2>Chapter 2: Text Elements</h2>
	<p>Text elements include headings, paragraphs, emphasis, and line breaks.</p>

	<!--
		Quick Revision:
		- <hr> represents thematic separation.
		- It is an empty element.
		- Best used between related content groups.
	-->
</body>
</html>
