<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Strong and B Tag</title>
</head>
<body>
	<!--
		LESSON: <strong> vs <b>

		Concept:
		Both can make text look bold, but their meaning is different.

		Notes:
		1) <strong> means the text is important (semantic meaning).
		2) <b> only makes text bold visually (no extra importance).
		3) Prefer <strong> when importance should be understood by search engines and screen readers.
	-->

	<p>
		Please submit your assignment before <strong>Friday 5:00 PM</strong>.
	</p>

	<p>
		This word is bold only for style: <b>Frontend</b>.
	</p>

	<!--
		Quick Revision:
		- <strong> = importance.
		- <b> = visual bold text.
		- Use semantic tags whenever possible.
	-->
</body>
</html>
