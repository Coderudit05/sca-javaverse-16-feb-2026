<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Paragraph Tag</title>
</head>
<body>
	<!--
		LESSON: Paragraph Tag <p>

		Concept:
		<p> is used to write paragraphs of text.

		Notes:
		1) Each <p> starts on a new line (block-level).
		2) Browser removes extra spaces/new lines inside paragraph text.
		3) Use multiple <p> tags for separate ideas.
	-->

	<p>
		HTML is the standard markup language used to create the structure of web pages.
	</p>

	<p>
		In this class, we are learning text-related tags step by step so that you can write meaningful content on a page.
	</p>

	<p>
		Practice tip: keep each paragraph focused on one idea for better readability.
	</p>

	<!--
		Quick Revision:
		- Use <p> for paragraph content.
		- Do not use one paragraph for all page content.
		- Keep content clean and readable.
	-->
</body>
</html>
