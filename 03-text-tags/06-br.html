<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>BR Tag</title>
</head>
<body>
	<!--
		LESSON: Line Break Tag <br>

		Concept:
		<br> inserts a single line break inside text.

		Notes:
		1) <br> is an empty tag (no closing tag needed).
		2) Useful in poems, addresses, and lyrics.
		3) Do not use many <br> tags for spacing; use CSS margin/padding instead.
	-->

	<p>
		Name: Udit<br />
		Course: HTML and CSS<br />
		City: Jaipur
	</p>

	<p>
		Roses are red,<br />
		Violets are blue,<br />
		Practice your tags,<br />
		Success will come to you.
	</p>

	<!--
		Quick Revision:
		- <br> = one line break.
		- Use for content-based line breaks, not layout spacing.
	-->
</body>
</html>
