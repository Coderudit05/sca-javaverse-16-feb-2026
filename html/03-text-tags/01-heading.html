<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Heading Tags</title>
</head>
<body>
	<!--
		LESSON: Heading Tags (h1 to h6)

		Concept:
		Headings define title hierarchy of a page, just like chapter headings in a book.

		Notes:
		1) <h1> is the most important heading.
		2) <h6> is the least important heading.
		3) Use headings in order for proper structure and accessibility.
		4) Usually one main <h1> per page is a good practice.
	-->

	<h1>Welcome to HTML Class</h1>
	<h2>Module 1: Text Tags</h2>
	<h3>Topic: Heading Elements</h3>
	<h4>Subtopic: Importance of Structure</h4>
	<h5>Example: Smaller Heading</h5>
	<h6>Example: Smallest Heading</h6>

	<!--
		Quick Revision:
		- Heading tags are block-level elements.
		- They are not used to make text "just bigger".
		- They are used to show content importance.
	-->
</body>
</html>
